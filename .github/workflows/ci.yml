name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-java:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
    
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
    
    - name: Build with Maven
      run: mvn compile -DskipTests

    # Tests are disabled in CI pipeline - run locally when needed
    # - name: Run tests
    #   run: mvn test -Djgpt.allow.no.gpu=true

  # Note: CUDA build requires GPU runner (self-hosted or paid)
  # This is a template for future setup
  build-cuda:
    runs-on: self-hosted
    if: false  # Disabled until GPU runner is available
    steps:
    - uses: actions/checkout@v4
    
    - name: Build CUDA libraries
      run: |
        cd src/main/cpp
        mkdir -p build && cd build
        cmake ..
        cmake --build .
    
    - name: Test CUDA build
      run: |
        ls -la build/libjgpt_cuda*.so
