# Сборка и тесты без GPU: CUDA-тесты пропускаются, остальное — регрессия на CPU
# (в т.ч. GenerateSlidingWindowCpuTest — скользящее окно generate с host-KV).
# Локально с GPU: scripts/mvn_test_gpu.sh
name: Maven

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Compile and test
        run: mvn -B test
